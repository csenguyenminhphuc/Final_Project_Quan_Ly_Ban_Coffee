<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thông Báo Khuyến Mãi</title>

<style>
body{
    font-family: "Times New Roman", serif;
    background:#f6f4f1;
    margin:0;
    padding:30px;
}

.wrapper{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#6b3e26;
    margin-bottom:25px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:20px;
}

.box{
    flex:1;
    background:#fff8f2;
    padding:20px;
    border-radius:10px;
    border:1px solid #e6d5c3;
}

.box h2{
    font-size:18px;
    margin-bottom:10px;
    color:#8b4513;
}

.highlight{
    color:#c0392b;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:25px;
    font-style:italic;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>📢 CHƯƠNG TRÌNH KHUYẾN MÃI & VOUCHER ☕</h1>

<div class="row">

<div class="box">
<h2>🎉 Ưu đãi</h2>
<p>🎟 <span class="highlight">Giảm 20%</span> toàn menu</p>
<p>🎟 Mua 2 tặng 1</p>
<p>🎟 Voucher 30.000đ (hóa đơn ≥150.000đ)</p>
</div>

<div class="box">
<h2>💳 Thông tin</h2>
<p>⏳ Áp dụng từ ... đến ...</p>
<p>📍 Tại cửa hàng</p>
<p>⛔ Không áp dụng cùng ưu đãi khác</p>
</div>

</div>

<div class="footer">
❤️ Hân hạnh phục vụ quý khách!
</div>

</div>

</body>
</html>
